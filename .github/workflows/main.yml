name: Stock Monitor Loop

on:
  schedule:
    - cron: '*/5 0-6 * * 1-5' # 平日 9:00-15:00 (JST)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install yfinance pandas requests numpy
      - name: Run Monitor
        run: python monitor.py
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # ファイルが存在する場合のみ追加（エラー防止）
          git add pre_scan_results.json jack_watchlist.json || true
          git commit -m "Auto-update" || exit 0
          git push
