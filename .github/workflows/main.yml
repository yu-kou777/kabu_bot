name: Stock Monitor Loop

on:
  schedule:
    # ✅ 日本時間 08:45 にスキャン開始（UTC 23:45）
    - cron: '45 23 * * 0-4'
    # ✅ 5分おきの定期監視
    - cron: '*/5 0-6 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install yfinance==0.2.54 pandas requests numpy xlrd
      - name: Run Monitor
        run: python monitor.py
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f pre_scan_results.json ]; then git add pre_scan_results.json; fi
          if [ -f jack_watchlist.json ]; then git add jack_watchlist.json; fi
          git commit -m "System auto-update [skip ci]" || exit 0
          git pull --rebase origin main
          git push origin main
