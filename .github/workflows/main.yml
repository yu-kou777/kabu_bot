name: Jack_Scheduled_Scan
on:
  schedule:
    - cron: '00 04 * * *' # 日本時間 13:00
    - cron: '00 07 * * *' # 日本時間 16:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip' # これで次回から爆速になります

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # バージョンを固定してインストール時間の肥大化を防ぎます
          pip install "yfinance>=0.2.40" "pandas<2.2.0" "numpy<2.0.0" "google-genai" "discord-webhook" "streamlit"

      - name: Run Scan
        run: python main.py
