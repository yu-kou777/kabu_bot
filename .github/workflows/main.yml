name: Jack_Scheduled_Scan

on:
  schedule:
    # 💡 UTC表記（日本時間 -9時間）
    - cron: '45 23 * * 0-4' # 日本時間 08:45 (寄り付き前)
    - cron: '00 04 * * 1-5' # 日本時間 13:00 (昼休み明け)
    - cron: '00 06 * * 1-5' # 日本時間 15:00 (大引け)
  workflow_dispatch: # 手動実行ボタン用

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Scan
        run: |
          # 💡 ここを monitor.py にするのが正解です！
          python monitor.py 
