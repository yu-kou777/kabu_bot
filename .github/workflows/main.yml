name: Jack_Stock_AI_Scan
on:
  schedule:
    - cron: '15 07 * * *' # 日本時間 16:15
  workflow_dispatch: # Actionsタブから手動実行可能にするボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install yfinance pandas pandas_ta google-generativeai discord-webhook
      - name: Run Scan
        run: python main.py
