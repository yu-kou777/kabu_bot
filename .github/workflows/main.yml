name: Stock Monitor Loop

on:
  schedule:
    - cron: '*/5 0-6 * * 1-5' # 平日の日本時間 9:00-15:00 頃に5分おきに実行
  workflow_dispatch: # 手動実行ボタン用

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 👈 これが重要！GitHubにファイルを書き込む許可
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install yfinance pandas requests numpy
      - name: Run Monitor
        run: python monitor.py
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pre_scan_results.json jack_watchlist.json
          git commit -m "Auto-update stock data" || exit 0
          git push
