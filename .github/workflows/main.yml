name: Jack_Scheduled_Scan
on:
  schedule:
    - cron: '00 04 * * *' # 日本時間 13:00
    - cron: '00 07 * * *' # 日本時間 16:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install yfinance pandas pandas_ta google-generativeai discord-webhook numpy openpyxl
      - name: Run Scan
        run: python main.py
