name: Jack株AI・テス流厳選スイングパトロール

on:
  schedule:
    # 💡 11:00 (日本時間) ＝ UTC 2:00
    # 💡 16:00 (日本時間) ＝ UTC 7:00
    # 月曜日から金曜日まで毎日定時実行
    - cron: '0 2,7 * * 1-5'
  
  # 💡 いつでもGitHub上のボタンから手動テスト起動を可能にする設定
  workflow_dispatch:

jobs:
  patrol:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのコードをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 必要なライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests numpy xlrd openpyxl pytz jpholiday

      - name: スクリーニングスクリプトの実行
        env:
          # もしAPIキーなどを環境変数化する場合はここに記述します
          GEMINI_KEY: "AIzaSyBUiTPV-0yOXIDzgydV4NoArJkBufJSpys"
        run: |
          python main.py

