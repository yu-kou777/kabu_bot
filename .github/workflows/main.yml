name: Jack_Scheduled_Scan

on:
  schedule:
    # 日本時間 08:45, 13:00, 15:00 (UTCは-9時間)
    - cron: '45 23 * * 0-4'
    - cron: '00 04 * * 1-5'
    - cron: '00 06 * * 1-5'
  workflow_dispatch: # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Scan
        run: |
          # 💡 main.py ではなく monitor.py を動かします
          python monitor.py
