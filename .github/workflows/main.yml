name: Jack株AI・テス流厳選スイングパトロール

on:
  schedule:
    # 💡 11:00 (日本時間) ＝ UTC 2:00 / 16:00 (日本時間) ＝ UTC 7:00
    - cron: '0 2,7 * * 1-5'
  
  # 💡 手動テスト起動ボタンを有効化
  workflow_dispatch:

jobs:
  patrol:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのコードをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ーーー 📦 ここでエラーの原因であるjpholiday等のライブラリを全て強制インストールします ーーー
      - name: 必要なライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests numpy xlrd openpyxl pytz jpholiday

      # ーーー 🚀 Pythonスクリプトの実行（ファイル名がmain.pyの場合） ーーー
      - name: スクリーニングスクリプトの実行
        env:
          GEMINI_KEY: "AIzaSyBUiTPV-0yOXIDzgydV4NoArJkBufJSpys"
        run: |
          python main.py
