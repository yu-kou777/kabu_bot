name: Daily Breakout Screener

on:
  schedule:
    # 毎日日本時間15:15（UTC 6:15）に自動実行
    - cron: '15 6 * * 1-5'
  workflow_dispatch: # GitHub上で手動実行できるボタンを表示

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: リポジトリのチェックアウト
      uses: actions/checkout@v4

    - name: Python環境のセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 依存ライブラリのインストール
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: スクリーニングおよびDiscord通知の実行
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py
