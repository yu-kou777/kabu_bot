name: Jack_Scheduled_Scan
on:
  schedule:
    - cron: '00 04 * * 1-5' # 月〜金 日本時間 13:00
    - cron: '00 06 * * 1-5' # 月〜金 日本時間 15:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Scan
        run: python main.py
