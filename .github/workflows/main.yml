name: Jack_Scheduled_Scan
on:
  schedule:
    - cron: '00 04 * * *' # 日本時間 13:00 (平日)
    - cron: '00 07 * * *' # 日本時間 16:00 (平日)
  workflow_dispatch:      # 手動実行用ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas google-genai discord-webhook numpy xlrd openpyxl

      - name: Run Scan
        # 💡 ここで GitHub Secrets の情報をプログラムに注入します
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py
